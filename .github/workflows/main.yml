name: 🪒 متجر الحلاقة SO2_MK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
    - name: تحميل المستودع
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: إعداد Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: تشغيل المولد
      run: python scraper.py
    
    - name: عرض النتائج
      run: |
        echo "📂 الملفات المنشأة:"
        ls -la *.html *.json *.md 2>/dev/null || true
        if [ -f products.json ]; then
          python3 -c "import json; d=json.load(open('products.json')); print(f'📊 المنتجات: {d[\"total\"]}')"
        fi
    
    - name: حفظ التغييرات
      run: |
        git config user.name 'GitHub Actions'
        git config user.email 'actions@github.com'
        git add .
        if git diff --staged --quiet; then
          echo "لا تغييرات"
        else
          git commit -m "تحديث تلقائي [skip ci]"
          git push
        fi
    
    - name: نشر للموقع
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        force_orphan: true
        commit_message: 'نشر الموقع [skip ci]'
