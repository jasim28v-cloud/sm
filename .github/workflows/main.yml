name: 🪒 إنشاء متجر الحلاقة الكامل

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-complete-website:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 تحميل المستودع
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: 🐍 إعداد Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 تثبيت المكتبات
      run: |
        python -m pip install --upgrade pip --quiet
        pip install requests cloudinary --quiet
    
    - name: 🎨 إنشاء الملف السحري scraper.py
      run: |
        cat > scraper.py << 'SCRAPEREOF'
